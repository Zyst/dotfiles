# Font
font_size 12.0

font_family MonoLisa
font_features MonoLisa-Medium +zero +ss04 +ss07 +ss08 +ss09
font_features MonoLisa-MediumItalic +zero +ss04 +ss07 +ss08 +ss09

# Sounds
enable_audio_bell no

# Cursor
cursor_shape block

# Hide titlebar/borders
hide_window_decorations yes

# Theme — egoist-one as fallback, second include is the active theme
include kitty-themes/egoist-one.conf
include kitty-themes/kanagawa-dragon.conf

# Hotkeys
map f11       toggle_fullscreen
map alt+enter toggle_fullscreen

# Disable kitty's built-in split ("new_window") bindings — tmux owns local
# pane management, and these defaults steal hotkeys we use elsewhere.
map cmd+enter        no_op
map ctrl+shift+enter no_op

# Emit the CSI-u sequence for Shift+Enter directly, so apps (e.g. Claude Code)
# see it as a distinct keypress whether or not tmux is in the chain. Without
# this, tmux doesn't forward Claude's keyboard-protocol-enable request upstream
# to Kitty, so Kitty would stay in legacy mode and Shift+Enter would arrive as
# plain `\n` (same as Enter).
map shift+enter send_text all \x1b[13;2u

# Misc
update_check_interval 0
term xterm-256color
